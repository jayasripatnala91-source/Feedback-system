<!DOCTYPE html>
<html>
<head>
    <title>All Feedback</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <h2 class="mb-4">All Feedback</h2>
<a href="/download" class="btn btn-primary mb-3">Download Excel</a>

    <table class="table table-bordered table-striped">
        <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Message</th>
            <th>Action</th>
        </tr>

        {% for f in feedbacks %}
        <tr>
            <td>{{ f.name }}</td>
            <td>{{ f.email }}</td>
            <td>{{ f.message }}</td>
            <td>
                <a href="/delete/{{ f.id }}" class="btn btn-danger btn-sm">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </table>

    <a href="/" class="btn btn-secondary">Home</a>
</div>

</body>
</html>
