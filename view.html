<h2>All Feedback</h2>

<table border="1">
    <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Message</th>
    </tr>

    {% for f in feedbacks %}
    <tr>
        <td>{{ f.name }}</td>
        <td>{{ f.email }}</td>
        <td>{{ f.message }}</td>
    </tr>
    {% endfor %}
</table>
